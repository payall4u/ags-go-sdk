# golangci-lint 配置文件
# 文档: https://golangci-lint.run/usage/configuration/

run:
  # 超时时间
  timeout: 5m
  # 要检查的目录
  modules-download-mode: readonly

linters:
  enable:
    # 默认启用的 linter
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码建议
    - govet         # 报告可疑的构造
    - ineffassign   # 检测无效赋值
    - staticcheck   # 静态分析检查
    - unused        # 检查未使用的代码
    
    # 额外启用的 linter
    - bodyclose     # 检查 HTTP 响应 body 是否关闭
    - copyloopvar   # 替代已弃用的 exportloopref (Go 1.22+)
    - dogsled       # 检查过多的空白标识符赋值
    - dupl          # 检查重复代码
    - gocognit      # 认知复杂度检查
    - goconst       # 检查可以替换为常量的重复字符串
    - gocritic      # 代码风格和性能检查
    - gocyclo       # 圈复杂度检查
    - gofmt         # 检查代码格式
    - goimports     # 检查 import 语句格式
    - goprintffuncname # 检查 printf 类函数命名
    - gosec         # 安全检查
    - misspell      # 拼写检查
    - nakedret      # 检查裸返回
    - noctx         # 检查 HTTP 请求是否使用 context
    - nolintlint    # 检查 nolint 指令格式
    - prealloc      # 检查可以预分配的切片
    - revive        # 代码风格检查
    - unconvert     # 检查不必要的类型转换
    - unparam       # 检查未使用的函数参数
    - whitespace    # 检查不必要的空白行

linters-settings:
  errcheck:
    # 检查类型断言
    check-type-assertions: true
    # 检查空白标识符赋值
    check-blank: true

  govet:
    # 启用所有分析器
    enable-all: true
    disable:
      - fieldalignment # 字段对齐检查可能过于严格

  gocyclo:
    # 圈复杂度阈值
    min-complexity: 50

  gocognit:
    # 认知复杂度阈值
    min-complexity: 50

  dupl:
    # 重复代码检测阈值
    threshold: 150

  goconst:
    # 最小字符串长度
    min-len: 3
    # 最小出现次数
    min-occurrences: 3

  misspell:
    locale: US

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true  # 禁用导出命名检查
      - name: if-return
      - name: increment-decrement
      - name: var-naming
        disabled: true  # 禁用变量命名规范检查
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gosec:
    excludes:
      - G104 # 忽略未检查的错误（errcheck 已覆盖）

  nakedret:
    # 函数行数超过此值时禁止裸返回
    max-func-lines: 30

issues:
  # 显示所有问题
  max-issues-per-linter: 0
  max-same-issues: 0
  
  # 排除目录 (替代已弃用的 run.skip-dirs)
  exclude-dirs:
    - pb
  
  # 排除文件 (替代已弃用的 run.skip-files)
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.connect\\.go$"
  
  # 排除规则
  exclude-rules:
    # 测试文件放宽检查
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - gocognit
        - gocyclo
    
    # example 目录放宽检查
    - path: example/
      linters:
        - gosec
        - errcheck

    # 忽略生成的 protobuf 文件
    - path: ".*\\.pb\\.go"
      linters:
        - all
    
    - path: ".*\\.connect\\.go"
      linters:
        - all

output:
  # 输出格式
  formats:
    - format: colored-line-number
  # 打印检查的文件
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
